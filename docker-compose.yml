services:
  mysql:
    image: mysql:8.4
    container_name: aihr-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: aihr
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: aihr
      MYSQL_PASSWORD: aihr
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aihr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
  redis-data:

